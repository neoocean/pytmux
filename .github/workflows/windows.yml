name: windows-compat

# macOS(arm64) 개발 환경에서는 Windows 네이티브 경로(pywinpty/ConPTY, proc.py 실경로,
# ipc TCP 엔드포인트)를 직접 검증할 수 없다. 이 워크플로가 GitHub의 windows-latest
# (Windows Server 2022, x86-64) 러너에서 그 부분을 자동으로 본다.
# 자세한 배경·한계는 docs/WINDOWS_TESTING.md 참고.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:        # Actions 탭에서 수동 트리거

jobs:
  windows:
    runs-on: windows-latest    # Windows Server 2022, x86-64
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install deps (incl. pywinpty)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Smoke — pywinpty imports + ConPTY spawns
        run: python -c "from winpty import PtyProcess; p=PtyProcess.spawn('cmd /c echo ok'); print('pywinpty OK')"

      - name: Headless test suite
        run: python tests/run.py

      - name: Windows compat + perf report
        run: python scripts/win_report.py --mb 5

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: win-report-py${{ matrix.python }}
          path: reports/win-report-*.md
          if-no-files-found: warn
