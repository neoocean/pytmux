name: os-compat

# macOS(arm64) 개발 환경에서는 Windows 네이티브 경로(pywinpty/ConPTY, proc.py 실경로,
# ipc TCP 엔드포인트)를 직접 검증할 수 없고, 깨끗한 Linux(POSIX-but-not-macOS)에서의
# 이식성도 못 본다. 이 워크플로가 GitHub 러너에서 macOS/Linux/Windows 3종을 한 번에 본다.
# 자세한 배경·한계는 docs/WINDOWS_TESTING.md 참고.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:        # Actions 탭에서 수동 트리거

# 연속 푸시가 9잡 매트릭스를 겹쳐 띄워 무료 macOS 러너가 적체되는 것을 막는다 —
# 같은 ref 의 진행 중 run 을 새 푸시가 취소(최신 커밋만 검증). PR/브랜치별로 격리.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]   # Linux x86-64 / macOS arm64 / Win Server
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    # 한 잡이 매달려도(과거 macOS 러너에서 PTY/서브프로세스 데드락으로 47분씩 돌다
    # 다음 푸시에 취소됨) 12분 안에 끊어 비싼 러너 분을 낭비하지 않는다. 정상 잡은
    # ~5분. tests/run.py 의 테스트별 타임아웃(PYTMUX_TEST_TIMEOUT)이 1차 방어, 이건 2차.
    timeout-minutes: 12
    env:
      # Windows 콘솔에서 한글 출력이 cp1252 로 깨져 러너가 UnicodeEncodeError 로 죽던
      # 것 방지(러너의 stdout reconfigure 와 함께 이중 방어). 파이썬 전 출력 UTF-8.
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install deps
        # pywinpty 는 requirements.txt 의 sys_platform=="win32" 마커로
        # Linux/macOS 에선 pip 이 자동 스킵한다(설치 실패 없음).
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Smoke — pywinpty imports + ConPTY spawns (Windows only)
        if: runner.os == 'Windows'
        run: python -c "from winpty import PtyProcess; p=PtyProcess.spawn('cmd /c echo ok'); print('pywinpty OK')"

      - name: Headless test suite
        timeout-minutes: 8        # 스위트는 보통 ~수분 — 매달리면 여기서 끊어 잡 전체를 안 먹게
        run: python -u tests/run.py   # -u: 버퍼링 없이 진행 즉시 출력(행 지점 식별)

      - name: Compat + perf report
        timeout-minutes: 4        # win_report 가 서브프로세스에서 매달려도 스위트 결과는 남게
        run: python -u scripts/win_report.py --mb 5

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.os }}-py${{ matrix.python }}
          path: reports/win-report-*.md
          if-no-files-found: warn
