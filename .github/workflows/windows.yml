name: os-compat

# 이 워크플로의 목적은 **개발 박스(macOS)에서 직접 못 보는** 환경을 GitHub 러너에서
# 보는 것이다: ① Windows 네이티브 경로(pywinpty/ConPTY, proc.py 실경로, ipc TCP) ②
# 깨끗한 Linux(POSIX-but-not-macOS) 이식성. 자세한 배경은 docs/WINDOWS_TESTING.md.
#
# macОS 러너는 매트릭스에서 **뺐다**(2026-06-07): (a) 개발이 macOS 에서 이뤄져 로컬
# `python tests/run.py`(322 passed)가 같은 커버리지를 주므로 **중복**이고, (b) GitHub
# macOS 러너에서 **간헐적 데드락**(PTY/서브프로세스, 헤드리스·tty 부재 환경 특이)이 나
# 잡이 17분씩 매달리다 취소됐다 — 로컬·Linux·Windows 어디서도 재현 안 됨. SIGALRM·
# faulthandler·step/job 타임아웃 백스톱으로도 그 환경에선 신뢰성 있게 못 끊겨, 비싼
# 러너 분만 태우고 신호는 거짓-적색이었다. macOS 특이 검증이 필요하면 로컬에서 직접
# 돌리거나(개발 박스), 아래 matrix 에 `macos-latest` 를 한시적으로 도로 넣어 확인한다.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:        # Actions 탭에서 수동 트리거

# 연속 푸시가 매트릭스를 겹쳐 띄우는 것을 막는다 — 같은 ref 의 진행 중 run 을 새 푸시가
# 취소(최신 커밋만 검증). PR/브랜치별로 격리.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]   # Linux x86-64 / Win Server (macOS=개발 박스, 위 주석)
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    # 어떤 잡이든 매달리면 12분에 끊어 러너 분 낭비를 막는다(정상 ~5분). tests/run.py
    # 의 테스트별 SIGALRM·faulthandler 타임아웃이 1차 방어(행을 트레이스백과 함께 빠른
    # 실패로 전환), 이건 2차 안전망. (GitHub 의 timeout 강제는 wedged 러너에서 지연될 수
    # 있어, 자체 종료하는 run.py 쪽 백스톱이 더 신뢰성 있다.)
    timeout-minutes: 12
    env:
      # Windows 콘솔에서 한글 출력이 cp1252 로 깨져 러너가 UnicodeEncodeError 로 죽던
      # 것 방지(러너의 stdout reconfigure 와 함께 이중 방어). 파이썬 전 출력 UTF-8.
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install deps
        # pywinpty 는 requirements.txt 의 sys_platform=="win32" 마커로
        # Linux/macOS 에선 pip 이 자동 스킵한다(설치 실패 없음).
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Smoke — pywinpty imports + ConPTY spawns (Windows only)
        if: runner.os == 'Windows'
        run: python -c "from winpty import PtyProcess; p=PtyProcess.spawn('cmd /c echo ok'); print('pywinpty OK')"

      - name: Headless test suite
        timeout-minutes: 8        # 스위트는 보통 ~수분 — 매달리면 여기서 끊어 잡 전체를 안 먹게
        run: python -u tests/run.py   # -u: 버퍼링 없이 진행 즉시 출력(행 지점 식별)

      - name: Perf report (env + perf only)
        timeout-minutes: 4        # win_report 가 매달려도 스위트 결과는 남게
        # --no-tests: 호환성(헤드리스 스위트) 재실행을 끈다 — 위 "Headless test suite"
        # 스텝이 이미 권위 결과이고, win_report 가 스위트를 한 번 더 돌리면 (a) 중복
        # 실행이고 (b) 간헐 플레이크에 두 번째 노출돼 step1 통과(322/0)인데도 step2 에서
        # 떨어지는 거짓-적색을 냈다. 여기선 환경 정보 + perf 수치(feed/render)만 리포트.
        run: python -u scripts/win_report.py --no-tests --mb 5

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.os }}-py${{ matrix.python }}
          path: reports/win-report-*.md
          if-no-files-found: warn
