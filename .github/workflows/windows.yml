name: os-compat

# 이 워크플로의 목적은 **개발 박스(macOS)에서 직접 못 보는** 환경을 GitHub 러너에서
# 보는 것이다: ① Windows 네이티브 경로(pywinpty/ConPTY, proc.py 실경로, ipc TCP) ②
# 깨끗한 Linux(POSIX-but-not-macOS) 이식성. 자세한 배경은 docs/WINDOWS_TESTING.md.
#
# macOS 러너: 매트릭스에 넣되 **non-blocking**(continue-on-error, 아래)이다 — 사용자 요청
# 으로 도로 넣고(2026-06-11) "실패 안 할 때까지" 수정을 시도했으나, GitHub 의 **헤드리스
# macOS 러너가 인프라 레벨에서 wedge** 하는 것으로 **결론**났다(2026-06-12, 진단 4회):
#   · 스위트 startup 에서 **간헐적**으로 매달린다(3.11 이 한 번 3분에 통과한 적도 있어
#     데드락이 아니라 경쟁/인프라 타이밍 — 특정 테스트가 아니다).
#   · run.py 의 startup faulthandler(dump_traceback_later exit=True)·SIGALRM 도 **안 끊긴다**
#     → 파이썬 워치독 스레드조차 못 도는, 프로세스/스레드 **아래** 레벨 wedge.
#   · GitHub 의 step(8분)·job(12분) 타임아웃도 **안 지켜진다**(17분까지 매달림) → GitHub
#     자신의 제어 아래로 wedge.
#   · `if: always()` 업로드 post-step 조차 **안 돈다**(macOS 만 아티팩트 0개) → 콘솔·파일
#     어느 쪽으로도 행 지점을 못 건진다. ubuntu/windows 는 같은 진단으로 정상 회수됨.
# 즉 **우리 코드/설정으로는 못 고친다**(PTY/서브프로세스 다수 스위트 + 헤드리스 macOS
# 러너의 알려진 인프라 flakiness). **`continue-on-error` 도 안 통한다**: wedge 한 잡은
# GitHub 이 17분에 강제 **cancel** 하는데, continue-on-error 는 **fail** 한 잡만 구제하고
# cancel 된 잡은 그대로 run 을 cancel(빨강)시킨다. VM 자체가 wedge 라 in-VM 워치독(shell
# kill·python·timeout)으로 fail-fast 전환도 불가(러너 아래 레벨). → **결론: macOS 를 push
# 매트릭스에서 제외**(green 복구). macOS 검증은 로컬 개발 박스(macOS, `python tests/run.py`)
# 가 권위. 진단 상세·재현은 docs/WINDOWS_TESTING.md. (한시 재확인이 필요하면 위 matrix os
# 에 `macos-latest` 를 도로 넣어 보되, wedge 하면 run 이 cancel(빨강) 됨을 감안.)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:        # Actions 탭에서 수동 트리거

# 연속 푸시가 매트릭스를 겹쳐 띄우는 것을 막는다 — 같은 ref 의 진행 중 run 을 새 푸시가
# 취소(최신 커밋만 검증). PR/브랜치별로 격리.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]   # Linux x86-64 / Win Server (macOS=위 주석 — 인프라 wedge로 제외)
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    # 어떤 잡이든 매달리면 여기서 끊어 러너 분 낭비를 막는다(정상 ~5분). tests/run.py
    # 의 테스트별 SIGALRM·faulthandler 타임아웃이 1차 방어(행을 트레이스백과 함께 빠른
    # 실패로 전환), 이건 2차 안전망. (GitHub 의 timeout 강제는 wedged 러너에서 지연될 수
    # 있어, 자체 종료하는 run.py 쪽 백스톱이 더 신뢰성 있다.) 12→15(2026-07-10):
    # 아래 스위트 스텝 8→10 상향에 맞춰 후속 스텝(validate/perf) 몫을 보존.
    timeout-minutes: 15
    env:
      # Windows 콘솔에서 한글 출력이 cp1252 로 깨져 러너가 UnicodeEncodeError 로 죽던
      # 것 방지(러너의 stdout reconfigure 와 함께 이중 방어). 파이썬 전 출력 UTF-8.
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      # macOS 행(데드락) 1차 의심: subprocess/pty 가 **fork** 한 뒤(서버·그림자 probe·
      # PtyProcess.spawn) 부모가 CoreFoundation/ObjC 를 초기화한 상태면 macOS 의 fork-safety
      # 검사가 자식을 데드락시킨다(__THE_PROCESS_HAS_FORKED…). 스레드(asyncio·faulthandler
      # 워치독)와 fork 의 경쟁이라 **간헐적**이고(3.11 통과·3.12/3.13 행) 로컬 tty 환경엔
      # 안 나는 헤드리스 CI 특이 증상과 일치한다. 이 검사를 끄는 게 macOS CI 표준 회피책.
      # (Linux/Windows 엔 무의미·무해한 변수.) 효과 없으면 run.py 의 startup faulthandler
      # 트레이스백으로 정확한 fork 지점을 잡아 spawn 경로를 fork-안전하게 고친다.
      OBJC_DISABLE_INITIALIZE_FORK_SAFETY: "YES"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Install deps
        # pywinpty 는 requirements.txt 의 sys_platform=="win32" 마커로
        # Linux/macOS 에선 pip 이 자동 스킵한다(설치 실패 없음).
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Smoke — pywinpty imports + ConPTY spawns (Windows only)
        if: runner.os == 'Windows'
        run: python -c "from winpty import PtyProcess; p=PtyProcess.spawn('cmd /c echo ok'); print('pywinpty OK')"

      - name: Security E2E — TCP 루프백 인증 + 적대/퍼징 (SECURITY_REVIEW §9.4)
        # 보안 표면을 **이름 붙은 빠른 게이트**로 먼저 못박는다(풀 스위트에 묻히지 않게).
        # Windows 에서 특히 중요한 건 전송이 **TCP 루프백**이라는 점 — 메인 서버(F1)·
        # pty-host(M1) 둘 다 같은 머신의 다른 로컬 주체가 붙을 수 있어 토큰 인증이
        # 유일한 게이트다. test_security_runtime(server_only=Windows 면 TCP)·
        # test_ptyhost_auth(TCP 루프백 변형은 Windows 스킵 안 함)·test_redteam·
        # test_fuzz_parsers 가 그 무인가 차단·파서 견고성을 실측한다.
        timeout-minutes: 5
        run: python -u tests/run.py test_security_runtime test_ptyhost_auth test_redteam test_fuzz_parsers

      - name: Tier 3 red-team tool — live spawn battery (SECURITY_REVIEW §10 W2/W3)
        # 모듈 회귀(test_redteam)만으론 redteam **도구 자체**가 안 돌았다 — 특히
        # Windows 는 종전에 `--spawn` 이 unix 소켓 하드코딩으로 즉시 크래시했다(§10 W2).
        # 이제 도구가 프로덕션 전송(TCP 루프백)으로 격리 서버를 띄워 1200 적대 프레임을
        # 던지고, 서버 생존·무인가 수용 0·**핸들 누수 없음**(§10 W3 Windows 핸들 카운트)
        # 을 verdict 로 못박는다. exit code 가 0 이 아니면(=결함) 잡이 빨강. ubuntu·
        # windows-latest 양쪽에서 실 도구를 돌린다.
        timeout-minutes: 3
        run: python -u scripts/redteam.py --rounds 200

      - name: Tier 3 red-team tool — attach self-test (SECURITY_REVIEW §10 W5)
        # --spawn 은 **인프로세스**(self 자원)라 §10 W3 의 외부-PID 핸들/RSS 표본
        # 경로(OpenProcess·tasklist)를 안 친다. --attach-selftest 는 별도 자식
        # 프로세스로 격리 서버를 띄워 discover→attach 로 ① 디스커버리가 그 서버를
        # 찾고 ② netstat 가 소유 PID 를 정확히 집으며(=child pid 일치) ③ **외부 PID**
        # 핸들/RSS 가 실측되고 ④ 비파괴 배터리 뒤 서버 생존·핸들 누수 없음을 verdict
        # 로 못박는다. self-test 라 백그라운드 서버 오케스트레이션 불요(단일 명령).
        timeout-minutes: 3
        run: python -u scripts/redteam.py --attach-selftest --rounds 100

      - name: Headless test suite
        # 8→10(2026-07-10): windows 스위트 정상 소요가 이미 6~7분이라(3.13 실측 6:56)
        # 여유가 1분 미만이었고, 07-09 회귀(패널 spawn 당 chcp helper 지연)로 8분을
        # 넘겨 스위트가 **중간에 잘리며** run.py 말미 실패 트레이스백까지 유실됐다.
        # 지연 자체는 run.py 의 PYTMUX_KEEP_CODEPAGE=1 로 제거했지만, 성장 여유를 둔다.
        # (테스트별 행은 run.py 의 90s SIGALRM/faulthandler 가 1차로 끊는다.)
        timeout-minutes: 10
        run: python -u tests/run.py   # -u: 버퍼링 없이 진행 즉시 출력(행 지점 식별)

      - name: owned-ConPTY byte round-trip + CJK flood — §1.1② (Windows only)
        # B(라이브 검증을 CI 로): owned 백엔드의 raw-바이트 경로를 **실 conhost** 로
        # 검증 — [1] cmd 배너 attach · [2] 한글 echo 왕복 · [3] 대량 CJK 플러드
        # U+FFFD=0(read 경계 가로지르는 멀티바이트 무손상). owned 는 AllocConsole 로
        # 콘솔-less 프로세스에도 콘솔을 붙이므로 office 박스(헤드리스)에선 PASS 했다.
        # **blocking 승격(2026-06-18)**: 미실증이라 non-blocking(continue-on-error)으로
        # 도입했으나, run 27756140019 에서 windows-latest py3.11/3.12/3.13 전부
        # VERDICT: PASS(GHA VM 도 AllocConsole 출력 왕복 성립) 확인 → 회귀 게이트로
        # 전환한다. 이제 VERDICT≠PASS(예: §1.1② 손상 재발로 U+FFFD>0) 면 잡이 빨강.
        # validate_conpty.py 는 비-Windows 에서 SKIP(exit 0)이라 이 스텝은 Windows 한정.
        # 자식-종료→EOF(좀비) 경로는 출력 왕복이 불필요해 헤드리스에서도 확실히 돌므로
        # test_pty_backend 의 정식 테스트로 따로 둔다.
        if: runner.os == 'Windows'
        timeout-minutes: 3
        env:
          PYTMUX_PTY_BACKEND: owned
          TEMP: ${{ runner.temp }}      # validate_conpty.py 가 %TEMP%\validate_conpty.out 에 리포트 → 아래 업로드 경로와 일치
        run: python -u scripts/validate_conpty.py

      - name: Upload validate_conpty report (Windows only)
        if: always() && runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: validate-conpty-${{ matrix.os }}-py${{ matrix.python }}
          path: ${{ runner.temp }}/validate_conpty.out
          if-no-files-found: warn

      - name: Perf report (env + perf only)
        timeout-minutes: 4        # win_report 가 매달려도 스위트 결과는 남게
        # --no-tests: 호환성(헤드리스 스위트) 재실행을 끈다 — 위 "Headless test suite"
        # 스텝이 이미 권위 결과이고, win_report 가 스위트를 한 번 더 돌리면 (a) 중복
        # 실행이고 (b) 간헐 플레이크에 두 번째 노출돼 step1 통과(322/0)인데도 step2 에서
        # 떨어지는 거짓-적색을 냈다. 여기선 환경 정보 + perf 수치(feed/render)만 리포트.
        run: python -u scripts/win_report.py --no-tests --mb 5

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: report-${{ matrix.os }}-py${{ matrix.python }}
          path: reports/win-report-*.md
          if-no-files-found: warn
