name: os-compat

# 이 워크플로의 목적은 **개발 박스(macOS)에서 직접 못 보는** 환경을 GitHub 러너에서
# 보는 것이다: ① Windows 네이티브 경로(pywinpty/ConPTY, proc.py 실경로, ipc TCP) ②
# 깨끗한 Linux(POSIX-but-not-macOS) 이식성. 자세한 배경은 docs/WINDOWS_TESTING.md.
#
# macOS 러너 이력: 2026-06-07 에 **뺐었다** — GitHub macOS 러너에서 **간헐적 데드락**
# (PTY/서브프로세스, 헤드리스·tty 부재 환경 특이)이 나 잡이 17분씩 매달리다 취소됐고,
# 당시 백스톱(SIGALRM 등)으로 신뢰성 있게 못 끊겨 비싼 러너 분만 태웠다.
# 2026-06-11 **도로 넣었다**(사용자 요청): 그새 run.py 백스톱이 강화됐다 —
# faulthandler.dump_traceback_later(TIMEOUT+15s, exit=True)가 SIGALRM 으로도 안 끊기는
# 행을 **트레이스백과 함께 강제 종료**한다(17분 행 → ~2분 빠른-실패 + 행 지점 가시).
# 즉 macOS 특이 행이 재발해도 매달리지 않고 진단 가능한 실패로 떨어진다. 헤드리스
# macOS 에서 의미 없는(실 tty 의존) 테스트는 POSIX-but-headless 가드로 건너뛴다.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:        # Actions 탭에서 수동 트리거

# 연속 푸시가 매트릭스를 겹쳐 띄우는 것을 막는다 — 같은 ref 의 진행 중 run 을 새 푸시가
# 취소(최신 커밋만 검증). PR/브랜치별로 격리.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]   # Linux x86-64 / Win Server / macOS arm64
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    # 어떤 잡이든 매달리면 12분에 끊어 러너 분 낭비를 막는다(정상 ~5분). tests/run.py
    # 의 테스트별 SIGALRM·faulthandler 타임아웃이 1차 방어(행을 트레이스백과 함께 빠른
    # 실패로 전환), 이건 2차 안전망. (GitHub 의 timeout 강제는 wedged 러너에서 지연될 수
    # 있어, 자체 종료하는 run.py 쪽 백스톱이 더 신뢰성 있다.)
    timeout-minutes: 12
    env:
      # Windows 콘솔에서 한글 출력이 cp1252 로 깨져 러너가 UnicodeEncodeError 로 죽던
      # 것 방지(러너의 stdout reconfigure 와 함께 이중 방어). 파이썬 전 출력 UTF-8.
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      # macOS 행(데드락) 1차 의심: subprocess/pty 가 **fork** 한 뒤(서버·그림자 probe·
      # PtyProcess.spawn) 부모가 CoreFoundation/ObjC 를 초기화한 상태면 macOS 의 fork-safety
      # 검사가 자식을 데드락시킨다(__THE_PROCESS_HAS_FORKED…). 스레드(asyncio·faulthandler
      # 워치독)와 fork 의 경쟁이라 **간헐적**이고(3.11 통과·3.12/3.13 행) 로컬 tty 환경엔
      # 안 나는 헤드리스 CI 특이 증상과 일치한다. 이 검사를 끄는 게 macOS CI 표준 회피책.
      # (Linux/Windows 엔 무의미·무해한 변수.) 효과 없으면 run.py 의 startup faulthandler
      # 트레이스백으로 정확한 fork 지점을 잡아 spawn 경로를 fork-안전하게 고친다.
      OBJC_DISABLE_INITIALIZE_FORK_SAFETY: "YES"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install deps
        # pywinpty 는 requirements.txt 의 sys_platform=="win32" 마커로
        # Linux/macOS 에선 pip 이 자동 스킵한다(설치 실패 없음).
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Smoke — pywinpty imports + ConPTY spawns (Windows only)
        if: runner.os == 'Windows'
        run: python -c "from winpty import PtyProcess; p=PtyProcess.spawn('cmd /c echo ok'); print('pywinpty OK')"

      - name: Headless test suite
        timeout-minutes: 8        # 스위트는 보통 ~수분 — 매달리면 여기서 끊어 잡 전체를 안 먹게
        # 진단(macOS 행 추적, 2026-06-12): macOS 러너가 GitHub 의 step/job 타임아웃(8/12분)
        # 보다 더(17분) 매달려 콘솔 출력이 통째로 유실됐다(스위트 첫 줄도 안 보임). ① echo
        # 마커로 셸 스텝 진입 자체를 확인 ② `-X importtime` 로 import 완료를 즉시 stderr 에
        # 흘려 행 직전 마지막 import 를 가시화 ③ `tee` 로 디스크 파일에 줄 단위 기록 →
        # 콘솔이 유실돼도 파일에 진행이 남아 아래 always 업로드로 회수한다(행 지점 식별).
        run: |
          echo "=== suite step start $(date -u) ==="
          python -u -X importtime tests/run.py 2>&1 | tee suite-output.log
          echo "=== suite step end $(date -u) ==="

      - name: Upload suite log (diagnostic)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: suite-log-${{ matrix.os }}-py${{ matrix.python }}
          path: suite-output.log
          if-no-files-found: warn

      - name: Perf report (env + perf only)
        timeout-minutes: 4        # win_report 가 매달려도 스위트 결과는 남게
        # --no-tests: 호환성(헤드리스 스위트) 재실행을 끈다 — 위 "Headless test suite"
        # 스텝이 이미 권위 결과이고, win_report 가 스위트를 한 번 더 돌리면 (a) 중복
        # 실행이고 (b) 간헐 플레이크에 두 번째 노출돼 step1 통과(322/0)인데도 step2 에서
        # 떨어지는 거짓-적색을 냈다. 여기선 환경 정보 + perf 수치(feed/render)만 리포트.
        run: python -u scripts/win_report.py --no-tests --mb 5

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.os }}-py${{ matrix.python }}
          path: reports/win-report-*.md
          if-no-files-found: warn
